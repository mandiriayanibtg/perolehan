<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catat Perolehan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #1a1a1a; }
        .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
        
        select { appearance: none; }
        textarea { resize: none; overflow: hidden; }
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: rgba(15, 23, 42, 0.2); border-radius: 10px; }
        
        /* Tema kalender terang agar cocok dengan kaca frosted putih */
        input[type="date"] { color-scheme: light; }
        ::selection { background-color: rgba(15, 23, 42, 0.15); color: #0f172a; }

        @keyframes popCheer { 0% { transform: scale(0.85); opacity: 0; } 60% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .cheer-pop { animation: popCheer 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
        @keyframes confettiFall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(70px) rotate(180deg); opacity: 0; } }
        .confetti-piece { animation: confettiFall 1.1s ease-in forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased relative min-h-screen">

    <!-- BACKGROUND ORIGINAL -->
    <div class="fixed inset-0 z-[-1]">
        <img src="bg.png" class="hidden sm:block h-full w-full object-cover" alt="Background Desktop" onerror="this.style.display='none'">
        <img src="bg2.png" class="block sm:hidden h-full w-full object-cover" alt="Background Mobile" onerror="this.style.display='none'">
    </div>

    <!-- MAIN CONTAINER -->
    <div class="absolute inset-0 bg-slate-900/40"></div>
    <div class="relative flex min-h-screen items-center justify-center p-4 sm:p-6 w-full">
        
        <!-- FROSTED LIGHT GLASS CARD -->
        <main class="relative w-full max-w-xl overflow-hidden rounded-[32px] border border-white/40 bg-white/40 shadow-[0_8px_32px_rgba(0,0,0,0.15)] backdrop-blur-sm">
            <div class="pointer-events-none absolute inset-0 rounded-[32px] bg-gradient-to-b from-white/30 to-transparent opacity-60"></div>
            
            <div class="relative p-6 sm:p-10">
                
                <!-- HEADER & SAPAAN -->
                <div class="flex items-start gap-4 mb-8">
                    <div id="sapaanIconWrap" class="shrink-0 flex h-14 w-14 items-center justify-center rounded-2xl bg-white/60 text-slate-800 shadow-sm border border-white/60 backdrop-blur-md mt-1">
                        <svg id="sapaanIcon" class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
                    </div>
                    <div>
                        <h1 id="sapaanTeks" class="font-display text-3xl font-bold text-slate-900 tracking-wide drop-shadow-sm">Halo!</h1>
                        <p id="sapaanSub" class="text-sm text-slate-700/90 mt-1.5 leading-relaxed font-medium">Silakan masuk ke sistem, isi pelan-pelan aja.</p>
                    </div>
                </div>

                <form id="perolehanForm" onsubmit="siapkanReview(this); return false;" class="space-y-6">
                    
                    <!-- MODE SWITCHER (TABS) -->
                    <div class="bg-white/40 p-1.5 rounded-2xl flex gap-1 border border-white/50 shadow-inner backdrop-blur-md relative z-10">
                        <button type="button" onclick="setMode('NORMAL')" id="btnModeNormal" class="flex-1 py-2.5 text-[11px] sm:text-xs font-bold rounded-xl bg-white text-blue-700 shadow-sm border border-slate-100 transition-all flex items-center justify-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> Personal
                        </button>
                        <button type="button" onclick="setMode('PIC')" id="btnModePic" class="flex-1 py-2.5 text-[11px] sm:text-xs font-bold rounded-xl text-slate-600 hover:bg-white/50 hover:text-slate-800 transition-all flex items-center justify-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg> Mode PIC
                        </button>
                        <button type="button" onclick="setMode('ABSEN')" id="btnModeAbsen" class="flex-1 py-2.5 text-[11px] sm:text-xs font-bold rounded-xl text-slate-600 hover:bg-white/50 hover:text-slate-800 transition-all flex items-center justify-center gap-1.5">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> Kehadiran
                        </button>
                    </div>

                    <!-- INPUT TANGGAL & GLOBAL NAMA -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label for="tanggal" class="mb-2 block text-sm font-bold text-slate-800/90">Tanggal</label>
                            <input type="date" id="tanggal" name="tanggal" required class="w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-slate-900 backdrop-blur-md transition-all focus:border-slate-400 focus:bg-white/70 focus:ring-4 focus:ring-slate-400/20 outline-none shadow-inner">
                        </div>
                        <div class="relative" id="wrapper-global-nama">
                            <label for="nama" class="mb-2 block text-sm font-bold text-slate-800/90">Nama Anda</label>
                            <select id="nama" name="nama" class="w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-slate-900 backdrop-blur-md transition-all focus:border-slate-400 focus:bg-white/70 focus:ring-4 focus:ring-slate-400/20 outline-none cursor-pointer shadow-inner">
                                <option class="bg-white text-slate-900" value="" disabled selected>Memuat data...</option>
                            </select>
                            <div class="absolute right-4 top-11 pointer-events-none text-slate-600">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-3">
                        <div class="h-px flex-1 bg-slate-400/20"></div>
                        <span id="labelSeparator" class="text-[11px] font-bold tracking-widest text-slate-500 uppercase">Produk & Catatan</span>
                        <div class="h-px flex-1 bg-slate-400/20"></div>
                    </div>

                    <!-- ======================================= -->
                    <!-- SECTION 1: INPUT PRODUK (NORMAL)        -->
                    <!-- ======================================= -->
                    <div id="section-produk" class="space-y-5">
                        <div id="dynamic-items-container" class="space-y-5">
                            <div class="item-card relative rounded-3xl border border-white/60 bg-white/40 p-5 pt-6 shadow-[0_4px_16px_rgba(0,0,0,0.05)] backdrop-blur-lg transition-all">
                                <div class="product-badge absolute -top-3 -left-3 flex h-8 w-8 items-center justify-center rounded-full bg-slate-800 text-white text-xs font-black shadow-md border border-slate-700">1</div>
                                
                                <button type="button" class="btn-remove-product hidden absolute -top-3 -right-3 flex h-8 w-8 items-center justify-center rounded-full bg-red-100 border border-red-200 text-red-600 hover:bg-red-500 hover:text-white transition-colors shadow-md" onclick="hapusElemen(this, '.item-card')" title="Hapus Produk Ini">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                
                                <div class="relative mb-5">
                                    <label class="mb-2 block text-sm font-bold text-slate-800/90">Pilih Produk</label>
                                    <select class="product-input w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-slate-900 backdrop-blur-md transition-all focus:border-slate-400 focus:bg-white/70 focus:ring-4 focus:ring-slate-400/20 outline-none cursor-pointer shadow-inner">
                                        <option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama Anda Dulu --</option>
                                    </select>
                                    <div class="absolute right-4 top-11 pointer-events-none text-slate-600">
                                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                    </div>
                                </div>
                                
                                <div>
                                    <label class="mb-2 block text-sm font-bold text-slate-800/90">Catatan <span class="font-normal text-slate-500">(ketik p.5 untuk 5 data)</span></label>
                                    <div class="notes-wrapper space-y-3">
                                        <div class="note-item flex gap-2 items-start">
                                            <textarea class="notes-input flex-1 min-h-[50px] w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-sm text-slate-900 placeholder:text-slate-500 backdrop-blur-md transition-all focus:border-slate-400 focus:bg-white/70 focus:ring-4 focus:ring-slate-400/20 outline-none shadow-inner" placeholder="Ketik catatan di sini..." rows="1"></textarea>
                                            <button type="button" class="btn-remove-note hidden p-3.5 rounded-2xl bg-red-100 border border-red-200 text-red-600 hover:bg-red-500 hover:text-white transition-colors" onclick="hapusElemen(this, '.note-item')" title="Hapus catatan ini">
                                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                            </button>
                                        </div>
                                    </div>
                                    <button type="button" class="w-full mt-3 py-2.5 rounded-xl border-2 border-dashed border-slate-300 bg-white/30 text-sm font-bold text-slate-600 hover:bg-white/60 hover:border-slate-400 transition-all flex items-center justify-center gap-2" onclick="tambahNote(this)">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Tambah Catatan Lain
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button type="button" id="btnTambahProduk" class="w-full py-3.5 rounded-2xl border border-white/60 bg-white/60 text-sm font-bold text-slate-800 hover:bg-white/80 transition-all flex items-center justify-center gap-2 shadow-sm" onclick="tambahProduk()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg> Tambah Produk Berbeda
                        </button>
                    </div>

                    <!-- ======================================= -->
                    <!-- SECTION 2: INPUT MODE PIC               -->
                    <!-- ======================================= -->
                    <div id="section-pic" class="hidden space-y-5">
                        
                        <!-- Global Product Selection -->
                        <div class="relative bg-blue-50/70 border border-blue-200/60 p-4 rounded-3xl shadow-sm">
                            <label class="mb-2 block text-sm font-bold text-blue-900">Produk Global (Berlaku untuk semua)</label>
                            <select id="picGlobalProduct" class="w-full rounded-xl border border-white/50 bg-white px-4 py-3.5 text-slate-900 transition-all outline-none cursor-pointer shadow-sm">
                                <option class="bg-white text-slate-900" value="" disabled selected>Memuat produk...</option>
                            </select>
                            <div class="absolute right-8 top-[3.25rem] pointer-events-none text-slate-400">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>

                        <!-- Dynamic PIC Items Container -->
                        <div id="pic-dynamic-items-container" class="space-y-4">
                            <div class="pic-item-card relative rounded-3xl border border-white/60 bg-white/40 p-5 pt-6 shadow-[0_4px_16px_rgba(0,0,0,0.05)] backdrop-blur-lg transition-all">
                                <div class="pic-badge absolute -top-3 -left-3 flex h-8 w-8 items-center justify-center rounded-full bg-blue-600 text-white text-xs font-black shadow-md border border-blue-500">1</div>
                                
                                <button type="button" class="hidden btn-remove-pic absolute -top-3 -right-3 flex h-8 w-8 items-center justify-center rounded-full bg-red-100 border border-red-200 text-red-600 hover:bg-red-500 hover:text-white transition-colors shadow-md" onclick="hapusElemen(this, '.pic-item-card')" title="Hapus Pegawai">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </button>
                                
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 items-start">
                                    <div class="relative">
                                        <label class="mb-2 block text-sm font-bold text-slate-800/90">Nama Pegawai</label>
                                        <select class="pic-emp-input w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-slate-900 backdrop-blur-md transition-all focus:border-blue-400 focus:bg-white/70 focus:ring-4 focus:ring-blue-400/20 outline-none cursor-pointer shadow-inner">
                                            <option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama --</option>
                                        </select>
                                        <div class="absolute right-4 top-[2.65rem] pointer-events-none text-slate-500">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="mb-2 block text-sm font-bold text-slate-800/90">Keterangan <span class="font-normal text-slate-500">(p.5)</span></label>
                                        <div class="pic-notes-wrapper space-y-3">
                                            <div class="pic-note-item flex gap-2 items-start">
                                                <textarea class="pic-notes-input flex-1 min-h-[50px] w-full rounded-2xl border border-white/50 bg-white/50 px-4 py-3.5 text-sm text-slate-900 placeholder:text-slate-500 backdrop-blur-md transition-all focus:border-blue-400 focus:bg-white/70 focus:ring-4 focus:ring-blue-400/20 outline-none shadow-inner" placeholder="Catatan..." rows="1"></textarea>
                                                <button type="button" class="btn-remove-pic-note hidden p-3 rounded-2xl bg-red-100 border border-red-200 text-red-600 hover:bg-red-500 hover:text-white transition-colors" onclick="hapusElemen(this, '.pic-note-item')" title="Hapus catatan ini">
                                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                </button>
                                            </div>
                                        </div>
                                        <button type="button" class="w-full mt-3 py-2 rounded-xl border-2 border-dashed border-slate-300 bg-white/30 text-xs font-bold text-slate-600 hover:bg-white/60 hover:border-slate-400 transition-all flex items-center justify-center gap-2" onclick="tambahPicNote(this)">
                                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Tambah Catatan
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <button type="button" class="w-full py-3.5 rounded-2xl border border-blue-300 bg-blue-50/80 text-sm font-bold text-blue-700 hover:bg-blue-100 transition-all flex items-center justify-center gap-2 shadow-sm backdrop-blur-md" onclick="tambahPicItem()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg> Tambah Pegawai Lain
                        </button>
                    </div>

                    <!-- ======================================= -->
                    <!-- SECTION 3: INPUT KEHADIRAN              -->
                    <!-- ======================================= -->
                    <div id="section-kehadiran" class="hidden space-y-5">
                        <div class="rounded-3xl border border-indigo-200 bg-indigo-50/60 p-6 shadow-sm backdrop-blur-lg">
                            <div class="relative mb-5">
                                <label class="mb-2 block text-sm font-bold text-indigo-900/90">Status Kehadiran</label>
                                <select id="statusAbsen" class="w-full rounded-2xl border border-indigo-200 bg-white/80 px-4 py-3.5 text-indigo-900 font-bold focus:border-indigo-400 focus:ring-4 focus:ring-indigo-400/20 outline-none cursor-pointer shadow-inner">
                                    <option class="bg-white text-indigo-900" value="[CUTI]">Sedang Cuti</option>
                                    <option class="bg-white text-indigo-900" value="[SAKIT]">Sedang Sakit</option>
                                    <option class="bg-white text-indigo-900" value="[IZIN]">Izin Lainnya</option>
                                    <option class="bg-white text-indigo-900" value="[SHIFT_MALAM]">Shift Malam</option>
                                </select>
                                <div class="absolute right-4 top-11 pointer-events-none text-indigo-500">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                            <div>
                                <label class="mb-2 block text-sm font-bold text-indigo-900/90">Keterangan <span class="font-normal text-indigo-500">(opsional)</span></label>
                                <input type="text" id="catatanAbsen" class="w-full rounded-2xl border border-indigo-200 bg-white/80 px-4 py-3.5 text-sm text-indigo-900 placeholder:text-indigo-400 focus:border-indigo-400 focus:ring-4 focus:ring-indigo-400/20 outline-none shadow-inner" placeholder="Misal: Cuti tahunan, sakit demam, masuk shift malam...">
                            </div>
                        </div>
                    </div>

                    <!-- TOMBOL KIRIM (Memicu Review) -->
                    <button type="submit" id="btnSimpan" class="mt-4 w-full rounded-2xl bg-slate-900 border border-slate-700 text-white py-4 font-bold shadow-[0_8px_20px_rgba(15,23,42,0.3)] transition hover:-translate-y-1 hover:bg-slate-800 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        Review & Kirim Data
                    </button>
                    
                </form>
            </div>
        </main>
    </div>

    <!-- TOMBOL NAVIGASI MELAYANG (FAB) -->
    <button type="button" id="navFab" onclick="openNavModal()" class="fixed bottom-5 right-5 z-[60] flex h-14 w-14 items-center justify-center rounded-full bg-slate-900 text-white shadow-[0_12px_30px_rgba(15,23,42,0.35)] transition hover:-translate-y-1 hover:bg-slate-800" aria-label="Buka menu navigasi">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <!-- MODAL MENU NAVIGASI -->
    <div id="navModal" class="hidden fixed inset-0 z-[75] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal('navModal')"></div>
        <div class="relative w-full max-w-sm overflow-hidden rounded-[28px] border border-white/60 bg-white/90 p-5 shadow-[0_25px_80px_rgba(0,0,0,.3)] backdrop-blur-2xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Navigasi</p>
                    <h3 class="font-display text-xl font-bold text-slate-900">Pilih Halaman</h3>
                </div>
                <button type="button" onclick="closeModal('navModal')" class="text-slate-400 hover:text-rose-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-3">
                <button type="button" onclick="navigateToPage('dashboard.html')" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3.5 text-left font-semibold text-slate-800 transition hover:bg-slate-100 flex justify-between items-center">
                    Dashboard Kinerja
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
                <button type="button" onclick="navigateToPage('admin.html')" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3.5 text-left font-semibold text-slate-800 transition hover:bg-slate-100 flex justify-between items-center">
                    Admin Panel
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- PENGGANTI MODAL REVIEW & STATUS -->
    <div id="reviewModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal('reviewModal')"></div>
        <div class="relative w-full max-w-md overflow-hidden rounded-[32px] border border-white/60 bg-white/80 p-6 sm:p-8 shadow-[0_25px_80px_rgba(0,0,0,.3)] backdrop-blur-3xl transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="flex items-center justify-between mb-4 border-b border-slate-200 pb-3">
                <h3 class="font-display text-xl font-bold text-slate-900">Review Data</h3>
                <button onclick="closeModal('reviewModal')" class="text-slate-400 hover:text-rose-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="overflow-y-auto custom-scrollbar flex-1 pr-2 mb-4" id="reviewContentArea"></div>
            <div class="flex gap-3 pt-4 border-t border-slate-200 mt-auto">
                <button onclick="closeModal('reviewModal')" class="flex-1 rounded-2xl bg-slate-100 border border-slate-300 py-3.5 font-bold text-slate-700 hover:bg-slate-200 transition-colors">Edit Lagi</button>
                <button id="btnConfirmKirim" onclick="executeSubmit()" class="flex-1 rounded-2xl bg-emerald-600 py-3.5 font-bold text-white hover:bg-emerald-500 transition-colors shadow-lg shadow-emerald-600/30">Kirim Sekarang</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="hidden fixed inset-0 z-[80] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal('successModal')"></div>
        <div class="relative w-full max-w-sm overflow-hidden rounded-[32px] border border-white/60 bg-white/90 p-8 text-center shadow-[0_25px_80px_rgba(0,0,0,.3)] backdrop-blur-2xl transform scale-95 transition-transform duration-300">
            <div class="relative mx-auto flex h-20 w-20 items-center justify-center rounded-3xl bg-emerald-100 border border-emerald-200 shadow-lg mb-6 cheer-pop">
                <svg class="h-10 w-10 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                <span class="confetti-piece absolute -top-2 -left-3 h-2 w-2 rounded-full bg-amber-400"></span>
                <span class="confetti-piece absolute -top-4 left-1/2 h-2 w-2 rounded-full bg-cyan-400" style="animation-delay:0.1s"></span>
                <span class="confetti-piece absolute -top-2 -right-3 h-2 w-2 rounded-full bg-rose-400" style="animation-delay:0.2s"></span>
            </div>
            <h3 class="font-display text-2xl font-bold text-slate-900 mb-2">Mantap, tersimpan!</h3>
            <p class="text-slate-600 mb-8 text-sm leading-relaxed font-medium">Data perolehan hari ini sudah tercatat rapi ke dalam sistem.</p>
            <button onclick="closeModal('successModal')" class="w-full rounded-2xl bg-slate-800 border border-slate-700 py-3.5 font-bold text-white hover:bg-slate-900 transition-colors shadow-lg">Tutup & Lanjutkan</button>
        </div>
    </div>

    <div id="errorModal" class="hidden fixed inset-0 z-[80] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal('errorModal')"></div>
        <div class="relative w-full max-w-sm overflow-hidden rounded-[32px] border border-white/60 bg-white/90 p-8 text-center shadow-[0_25px_80px_rgba(0,0,0,.3)] backdrop-blur-2xl transform scale-95 transition-transform duration-300">
            <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-3xl bg-rose-100 border border-rose-200 shadow-lg mb-6">
                <svg class="h-10 w-10 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h3 class="font-display text-2xl font-bold text-slate-900 mb-2">Terjadi Kesalahan</h3>
            <p id="errorMessage" class="text-slate-600 mb-8 text-sm leading-relaxed font-medium">Gagal terhubung ke server.</p>
            <button onclick="closeModal('errorModal')" class="w-full rounded-2xl bg-slate-100 border border-slate-300 py-3.5 font-bold text-slate-700 hover:bg-slate-200 transition-colors">Kembali</button>
        </div>
    </div>

    <script>
        // --- MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz78FGxmizakrGRFn4sLEMdovqce11sr32vQKtuE-gHQClCLFp_QO95sg6jnPu0de6e/exec'; 
        
        let mapKaryawan = {}; 
        let semuaProdukList = [];
        let opsiProdukCurrent = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama Anda Terlebih Dahulu --</option>';
        let opsiGlobalProduk = '<option class="bg-white text-slate-900" value="" disabled selected>Pilih Produk...</option>';
        let opsiSemuaKaryawan = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama --</option>';
        
        let currentMode = 'NORMAL'; // 'NORMAL', 'PIC', 'ABSEN'
        let pendingFormDataArray = []; // Array of payloads

        window.addEventListener('DOMContentLoaded', () => {
            setTanggalHariIni();
            fetchDataDariSpreadsheet();
            terapkanSapaanWaktu();

            document.getElementById('nama').addEventListener('change', function() {
                updateDropdownProduk(this.value);
                perbaruiSapaanNama(this.value);
            });

            // Handle Textarea Auto-resize for Normal and PIC Mode
            document.body.addEventListener('input', function(e) {
                if (e.target.classList.contains('notes-input') || e.target.classList.contains('pic-notes-input')) {
                    e.target.style.height = 'auto';
                    e.target.style.height = e.target.scrollHeight + 'px';
                }
            });
        });

        // =====================================
        // TAB MODE SWITCHER LOGIC
        // =====================================
        function setMode(mode) {
            currentMode = mode;
            
            const btnN = document.getElementById('btnModeNormal');
            const btnP = document.getElementById('btnModePic');
            const btnA = document.getElementById('btnModeAbsen');
            
            const activeClass = ['bg-white', 'text-blue-700', 'shadow-sm', 'border', 'border-slate-100'];
            const inactiveClass = ['text-slate-600', 'hover:bg-white/50', 'hover:text-slate-800'];
            
            [btnN, btnP, btnA].forEach(b => {
                b.classList.remove(...activeClass);
                b.classList.add(...inactiveClass);
            });

            const secNormal = document.getElementById('section-produk');
            const secPic = document.getElementById('section-pic');
            const secAbsen = document.getElementById('section-kehadiran');
            const wrapGlobalNama = document.getElementById('wrapper-global-nama');
            const sepLabel = document.getElementById('labelSeparator');

            secNormal.classList.add('hidden');
            secPic.classList.add('hidden');
            secAbsen.classList.add('hidden');

            if (mode === 'NORMAL') {
                btnN.classList.remove(...inactiveClass); btnN.classList.add(...activeClass);
                wrapGlobalNama.classList.remove('hidden');
                secNormal.classList.remove('hidden');
                sepLabel.innerText = "Produk & Catatan";
                document.getElementById('tanggal').parentElement.classList.remove('sm:col-span-2');
            } 
            else if (mode === 'PIC') {
                btnP.classList.remove(...inactiveClass); btnP.classList.add(...activeClass);
                wrapGlobalNama.classList.add('hidden'); 
                secPic.classList.remove('hidden');
                sepLabel.innerText = "Produk & Input Massal";
                document.getElementById('tanggal').parentElement.classList.add('sm:col-span-2'); 
                populatePicDropdowns(); 
            } 
            else if (mode === 'ABSEN') {
                btnA.classList.remove(...inactiveClass); btnA.classList.add(...activeClass);
                wrapGlobalNama.classList.remove('hidden');
                secAbsen.classList.remove('hidden');
                sepLabel.innerText = "Keterangan Kehadiran";
                document.getElementById('tanggal').parentElement.classList.remove('sm:col-span-2');
            }
        }

        function terapkanSapaanWaktu() {
            const jam = new Date().getHours();
            let sapaan, ikonSvg;
            if (jam < 10) {
                sapaan = 'Selamat Pagi!'; 
                ikonSvg = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v3m0 12v3m9-9h-3M6 12H3m14.36-6.36l-2.12 2.12M8.76 15.24l-2.12 2.12m0-10.72l2.12 2.12m6.48 6.48l2.12 2.12M12 8a4 4 0 100 8 4 4 0 000-8z"/>';
            } else if (jam < 15) {
                sapaan = 'Selamat Siang!'; 
                ikonSvg = '<circle cx="12" cy="12" r="4" stroke-width="2"/><path stroke-linecap="round" stroke-width="2" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>';
            } else if (jam < 18) {
                sapaan = 'Selamat Sore!'; 
                ikonSvg = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a9 9 0 0118 0M12 3v6m-6.36 1.64L7 12m10.36-2.36L15 12M3 20h18"/>';
            } else {
                sapaan = 'Selamat Malam!'; 
                ikonSvg = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
            }
            document.getElementById('sapaanTeks').textContent = sapaan;
            document.getElementById('sapaanIcon').innerHTML = ikonSvg;
        }

        function perbaruiSapaanNama(nama) {
            const sub = document.getElementById('sapaanSub');
            sub.textContent = nama ? `Semangat, ${nama}! Silakan catat perolehan hari ini.` : 'Silakan masuk ke sistem, isi pelan-pelan aja.';
        }

        function setTanggalHariIni() {
            const inputTanggal = document.getElementById('tanggal');
            const d = new Date();
            inputTanggal.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function fetchDataDariSpreadsheet() {
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    mapKaryawan = data.nama || {};
                    semuaProdukList = data.produk || [];
                    
                    const selectNama = document.getElementById('nama');
                    selectNama.innerHTML = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama Anda --</option>';
                    Object.keys(mapKaryawan).forEach(nama => selectNama.insertAdjacentHTML('beforeend', `<option class="bg-white text-slate-900" value="${nama}">${nama}</option>`));
                    
                    // Siapkan opsi global PIC
                    opsiSemuaKaryawan = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama --</option>';
                    Object.keys(mapKaryawan).forEach(nama => opsiSemuaKaryawan += `<option class="bg-white text-slate-900" value="${nama}">${nama}</option>`);
                    
                    opsiGlobalProduk = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Produk Global --</option>';
                    semuaProdukList.forEach(p => opsiGlobalProduk += `<option class="bg-white text-slate-900" value="${p}">${p}</option>`);
                    document.getElementById('picGlobalProduct').innerHTML = opsiGlobalProduk;
                    
                    populatePicDropdowns(); 
                })
                .catch(error => showModal('errorModal', 'Gagal memuat API. Pastikan internet stabil.'));
        }

        function updateDropdownProduk(namaKaryawan) {
            const assignedProducts = mapKaryawan[namaKaryawan].produkAssign || [];
            let htmlOpsi = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Produk --</option>';
            semuaProdukList.forEach(p => {
                if (assignedProducts.length === 0 || assignedProducts.includes(p.toUpperCase())) {
                    htmlOpsi += `<option class="bg-white text-slate-900" value="${p}">${p}</option>`;
                }
            });
            opsiProdukCurrent = htmlOpsi;
            document.querySelectorAll('.product-input').forEach(select => { select.innerHTML = opsiProdukCurrent; });
        }

        // =====================================
        // LOGIKA NORMAL MODE
        // =====================================
        function tambahProduk() {
            if(!document.getElementById('nama').value) { showModal('errorModal', "Pilih Nama Anda dulu!"); return; }
            const container = document.getElementById('dynamic-items-container');
            const template = container.querySelector('.item-card');
            const kartuBaru = template.cloneNode(true);
            kartuBaru.querySelector('.product-input').innerHTML = opsiProdukCurrent;
            kartuBaru.querySelector('.product-input').value = '';
            
            const semuaNotes = kartuBaru.querySelectorAll('.note-item');
            for(let i = 1; i < semuaNotes.length; i++) semuaNotes[i].remove(); 
            
            const notePertama = kartuBaru.querySelector('.note-item');
            notePertama.querySelector('.notes-input').value = '';
            notePertama.querySelector('.btn-remove-note').classList.add('hidden');
            kartuBaru.querySelector('.btn-remove-product').classList.remove('hidden');
            
            container.appendChild(kartuBaru);
            renomorBadge('.item-card', '.product-badge');
        }

        function tambahNote(btnElement) {
            const notesWrapper = btnElement.previousElementSibling; 
            const noteBaru = notesWrapper.querySelector('.note-item').cloneNode(true);
            noteBaru.querySelector('.notes-input').value = ''; 
            noteBaru.querySelector('.notes-input').style.height = 'auto';
            noteBaru.querySelector('.btn-remove-note').classList.remove('hidden'); 
            notesWrapper.appendChild(noteBaru);
        }

        // =====================================
        // LOGIKA PIC MODE
        // =====================================
        function populatePicDropdowns() {
            document.querySelectorAll('.pic-emp-input').forEach(select => { 
                if(select.innerHTML.trim() === "" || select.options.length <= 1) { select.innerHTML = opsiSemuaKaryawan; }
            });
        }

        function tambahPicItem() {
            const container = document.getElementById('pic-dynamic-items-container');
            const template = container.querySelector('.pic-item-card');
            const kartuBaru = template.cloneNode(true);
            
            kartuBaru.querySelector('.pic-emp-input').value = '';
            
            // Hapus tambahan catatan sebelumnya (reset ke 1 textarea saja)
            const notesWrapper = kartuBaru.querySelector('.pic-notes-wrapper');
            const semuaNotes = notesWrapper.querySelectorAll('.pic-note-item');
            for(let i = 1; i < semuaNotes.length; i++) semuaNotes[i].remove(); 
            
            const notePertama = notesWrapper.querySelector('.pic-note-item');
            notePertama.querySelector('.pic-notes-input').value = '';
            notePertama.querySelector('.pic-notes-input').style.height = 'auto';
            notePertama.querySelector('.btn-remove-pic-note').classList.add('hidden');

            kartuBaru.querySelector('.btn-remove-pic').classList.remove('hidden');
            
            container.appendChild(kartuBaru);
            renomorBadge('.pic-item-card', '.pic-badge');
        }

        function tambahPicNote(btnElement) {
            const notesWrapper = btnElement.previousElementSibling; 
            const noteBaru = notesWrapper.querySelector('.pic-note-item').cloneNode(true);
            noteBaru.querySelector('.pic-notes-input').value = ''; 
            noteBaru.querySelector('.pic-notes-input').style.height = 'auto';
            noteBaru.querySelector('.btn-remove-pic-note').classList.remove('hidden'); 
            notesWrapper.appendChild(noteBaru);
        }

        // =====================================
        // UTILITY UMUM & NAVIGASI
        // =====================================
        function hapusElemen(btnElement, targetClass) {
            btnElement.closest(targetClass).remove();
            if (targetClass === '.item-card') renomorBadge('.item-card', '.product-badge');
            if (targetClass === '.pic-item-card') renomorBadge('.pic-item-card', '.pic-badge');
        }

        function renomorBadge(cardSelector, badgeSelector) {
            document.querySelectorAll(cardSelector).forEach((kartu, idx) => {
                const badge = kartu.querySelector(badgeSelector);
                if (badge) badge.textContent = idx + 1;
            });
        }

        function showModal(modalId, message = '') {
            const modal = document.getElementById(modalId);
            if(message && modalId === 'errorModal') document.getElementById('errorMessage').innerText = message;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const box = modal.querySelector('.relative.transform');
                if(box) box.classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const box = modal.querySelector('.relative.transform');
            modal.classList.add('opacity-0');
            if(box) box.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function openNavModal() {
            showModal('navModal');
        }

        function navigateToPage(page) {
            closeModal('navModal');
            setTimeout(() => {
                window.location.href = page;
            }, 250);
        }

        // =====================================
        // PREPARE & SUBMIT DATA SECARA BERURUTAN
        // =====================================
        function siapkanReview(formObj) {
            pendingFormDataArray = []; // Reset Buffer
            const tglVal = formObj.tanggal.value;

            if (currentMode === 'ABSEN') {
                const statusValue = document.getElementById('statusAbsen').value;
                const catatanValue = document.getElementById('catatanAbsen').value.trim();
                const namaTerpilih = formObj.nama.value;
                if(!namaTerpilih) { showModal('errorModal', "Pilih Nama Anda!"); return; }
                
                pendingFormDataArray.push({
                    tanggal: tglVal, nama: namaTerpilih, role: mapKaryawan[namaTerpilih] ? mapKaryawan[namaTerpilih].role : "",
                    items: [{ product: statusValue, notes: catatanValue === "" ? "-" : catatanValue }]
                });
            } 
            else if (currentMode === 'NORMAL') {
                const namaTerpilih = formObj.nama.value;
                if(!namaTerpilih) { showModal('errorModal', "Pilih Nama Anda!"); return; }
                const arrayItems = [];

                document.querySelectorAll('.item-card').forEach(kartu => {
                    const productVal = kartu.querySelector('.product-input').value;
                    if(!productVal) return;
                    kartu.querySelectorAll('.notes-input').forEach(noteInput => {
                        let isiNote = noteInput.value.trim();
                        let matchMultiplier = isiNote.match(/^p\.\s*(\d+)$/i);
                        if (matchMultiplier) {
                            let jumlahData = parseInt(matchMultiplier[1], 10);
                            for (let j = 0; j < jumlahData; j++) { arrayItems.push({ product: productVal, notes: "0" }); }
                        } else {
                            arrayItems.push({ product: productVal, notes: isiNote === "" ? "0" : isiNote });
                        }
                    });
                });
                if(arrayItems.length === 0) { showModal('errorModal', "Pilih minimal 1 produk!"); return; }
                
                pendingFormDataArray.push({
                    tanggal: tglVal, nama: namaTerpilih, role: mapKaryawan[namaTerpilih] ? mapKaryawan[namaTerpilih].role : "",
                    items: arrayItems
                });
            }
            else if (currentMode === 'PIC') {
                const globalProduct = document.getElementById('picGlobalProduct').value;
                if(!globalProduct) { showModal('errorModal', "Pilih Produk Global!"); return; }
                
                let mapEmpItems = {}; 
                let hasValidData = false;

                document.querySelectorAll('.pic-item-card').forEach(kartu => {
                    const empName = kartu.querySelector('.pic-emp-input').value;
                    if(!empName) return; 
                    hasValidData = true;

                    if(!mapEmpItems[empName]) mapEmpItems[empName] = [];
                    
                    kartu.querySelectorAll('.pic-notes-input').forEach(noteInput => {
                        let isiNote = noteInput.value.trim();
                        let matchMultiplier = isiNote.match(/^p\.\s*(\d+)$/i);
                        if (matchMultiplier) {
                            let jumlahData = parseInt(matchMultiplier[1], 10);
                            for (let j = 0; j < jumlahData; j++) { mapEmpItems[empName].push({ product: globalProduct, notes: "0" }); }
                        } else {
                            mapEmpItems[empName].push({ product: globalProduct, notes: isiNote === "" ? "0" : isiNote });
                        }
                    });
                });

                if(!hasValidData) { showModal('errorModal', "Pilih minimal 1 nama pegawai!"); return; }

                Object.keys(mapEmpItems).forEach(emp => {
                    pendingFormDataArray.push({
                        tanggal: tglVal, nama: emp, role: mapKaryawan[emp] ? mapKaryawan[emp].role : "",
                        items: mapEmpItems[emp]
                    });
                });
            }

            // BUILD HTML REVIEW UI DARI ARRAY
            let htmlReview = `
                <div class="bg-slate-100/50 p-4 rounded-2xl border border-slate-200 mb-4 flex justify-between items-center">
                    <div><span class="text-slate-500 block text-xs font-bold uppercase mb-0.5">Tanggal Perolehan:</span> <strong class="text-slate-800 text-lg">${tglVal}</strong></div>
                    <div class="text-right"><span class="text-slate-500 block text-xs font-bold uppercase mb-0.5">Mode:</span> <span class="bg-white border border-slate-200 px-2 py-1 rounded text-xs font-bold text-blue-600">${currentMode}</span></div>
                </div>
            `;

            pendingFormDataArray.forEach(payload => {
                htmlReview += `<h4 class="font-bold text-slate-800 mt-5 mb-3 text-sm uppercase tracking-wider flex items-center gap-2">${payload.nama} <span class="text-[10px] font-bold text-white bg-blue-600 px-2 py-0.5 rounded-md shadow-sm">${payload.items.length} Data</span></h4>`;
                htmlReview += `<ul class="space-y-2">`;
                
                payload.items.forEach((item, index) => {
                    let badgeColor = (['[CUTI]', '[SAKIT]', '[IZIN]', '[SHIFT_MALAM]'].includes(item.product)) 
                                     ? 'bg-rose-100 text-rose-700' : 'bg-indigo-100 text-indigo-700';
                    htmlReview += `
                        <li class="bg-white p-3.5 rounded-xl border border-slate-200 shadow-sm flex flex-col gap-1.5">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-bold text-slate-400">#${index+1}</span>
                                <span class="px-2 py-0.5 rounded text-xs font-bold ${badgeColor}">${item.product}</span>
                            </div>
                            <span class="text-sm text-slate-600 ml-6">Catatan: <strong class="text-slate-800 font-medium">${item.notes}</strong></span>
                        </li>
                    `;
                });
                htmlReview += `</ul>`;
            });

            document.getElementById('reviewContentArea').innerHTML = htmlReview;
            showModal('reviewModal');
        }

        // Eksekusi secara sekuensial (satu per satu) agar aman dari limitasi Google Apps Script
        async function executeSubmit() {
            if(pendingFormDataArray.length === 0) return;

            const btn = document.getElementById('btnConfirmKirim');
            const originalBtnHtml = btn.innerHTML;
            btn.disabled = true;

            let allSuccess = true;
            let totalData = pendingFormDataArray.length;

            try {
                for (let i = 0; i < totalData; i++) {
                    btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses (${i+1}/${totalData})...`;
                    
                    const payload = pendingFormDataArray[i];
                    const response = await fetch(scriptURL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();
                    if(result.status !== 'sukses') {
                        allSuccess = false;
                    }
                }

                if(allSuccess) { 
                    closeModal('reviewModal');
                    setTimeout(() => { resetFormState(); showModal('successModal'); }, 300);
                } else {
                    closeModal('reviewModal');
                    setTimeout(() => showModal('errorModal', "Sebagian data gagal disimpan."), 300);
                }
            } catch (error) {
                closeModal('reviewModal');
                setTimeout(() => showModal('errorModal', "Gagal menghubungi server."), 300);
            } finally {
                btn.innerHTML = originalBtnHtml; 
                btn.disabled = false; 
                pendingFormDataArray = []; 
            }
        }

        function resetFormState() {
            const f = document.getElementById('perolehanForm');
            f.reset(); setTanggalHariIni();
            
            // Reset Dynamic Item Mode Normal
            document.querySelectorAll('.item-card').forEach((k, i) => { if(i > 0) k.remove(); });
            document.querySelector('.item-card').querySelectorAll('.note-item').forEach((n, i) => { if(i > 0) n.remove(); });
            document.querySelector('.product-input').innerHTML = '<option class="bg-white text-slate-900" value="" disabled selected>-- Pilih Nama Anda Terlebih Dahulu --</option>';
            document.querySelector('.notes-input').style.height = 'auto';

            // Reset Dynamic Item Mode PIC
            document.querySelectorAll('.pic-item-card').forEach((k, i) => { if(i > 0) k.remove(); });
            document.querySelector('.pic-item-card').querySelectorAll('.pic-note-item').forEach((n, i) => { if(i > 0) n.remove(); });
            document.getElementById('picGlobalProduct').value = '';
            document.querySelector('.pic-emp-input').value = '';
            document.querySelector('.pic-notes-input').value = '';
            document.querySelector('.pic-notes-input').style.height = 'auto';
            
            // Kembalikan ke mode awal
            setMode('NORMAL');
            renomorBadge('.item-card', '.product-badge');
            renomorBadge('.pic-item-card', '.pic-badge');
            perbaruiSapaanNama('');
        }
    </script>
</body>
