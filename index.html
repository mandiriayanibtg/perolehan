<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input Perolehan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        select { appearance: none; }
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 flex justify-center items-center min-h-screen p-4 sm:p-6 text-slate-700 antialiased relative">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 p-6 sm:p-8 z-10">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Catat Perolehan</h2>
            <p class="text-sm text-slate-500 mt-2">Isi data dengan santai, Anda bisa menambahkan banyak notes sekaligus.</p>
        </div>

        <form id="perolehanForm" onsubmit="handleFormSubmit(this); return false;" class="space-y-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="tanggal" class="block text-sm font-semibold text-slate-600 mb-2">Tanggal</label>
                    <input type="date" id="tanggal" name="tanggal" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-400 focus:bg-white outline-none transition-all duration-200 text-slate-700">
                </div>
                <div class="relative">
                    <label for="nama" class="block text-sm font-semibold text-slate-600 mb-2">Nama Anda</label>
                    <select id="nama" name="nama" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-400 focus:bg-white outline-none transition-all duration-200 text-slate-700 cursor-pointer">
                        <option value="" disabled selected>Memuat data...</option>
                    </select>
                    <div class="absolute right-4 top-10 pointer-events-none text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <hr class="border-slate-100">

            <div id="dynamic-items-container" class="space-y-5">
                <div class="item-card relative bg-white border border-slate-200 p-5 rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300">
                    <button type="button" class="btn-remove-product hidden absolute -top-3 -right-3 bg-red-100 text-red-500 hover:bg-red-500 hover:text-white rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-sm" onclick="hapusElemen(this, '.item-card')" title="Hapus Produk Ini">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    
                    <div class="relative mb-4">
                        <label class="block text-sm font-semibold text-slate-600 mb-2">Pilih Produk</label>
                        <select class="product-input w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-400 focus:bg-white outline-none transition-all duration-200 text-slate-700 cursor-pointer" required>
                            <option value="" disabled selected>-- Pilih Nama Anda Terlebih Dahulu --</option>
                        </select>
                        <div class="absolute right-4 top-10 pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-2">Catatan (Notes)</label>
                        <div class="notes-wrapper space-y-3">
                            <div class="note-item flex gap-2 items-start">
                                <textarea class="notes-input flex-1 min-h-[50px] px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-teal-400 focus:border-teal-400 focus:bg-white outline-none transition-all duration-200 text-slate-700 text-sm placeholder-slate-400" placeholder="Ketik catatan di sini..."></textarea>
                                <button type="button" class="btn-remove-note hidden p-3 bg-red-50 text-red-400 rounded-xl hover:bg-red-100 hover:text-red-600 transition-colors" onclick="hapusElemen(this, '.note-item')" title="Hapus catatan ini">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                        <button type="button" class="w-full mt-3 py-2.5 border-2 border-dashed border-slate-300 text-slate-500 font-medium rounded-xl hover:bg-slate-50 hover:border-teal-400 hover:text-teal-600 transition-all duration-200 flex items-center justify-center gap-2 text-sm" onclick="tambahNote(this)">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Tambah Catatan Lain
                        </button>
                    </div>
                </div>
            </div>

            <button type="button" class="w-full py-3.5 mb-2 bg-emerald-50 text-emerald-600 font-semibold rounded-xl hover:bg-emerald-100 transition-colors flex items-center justify-center gap-2 shadow-sm text-sm" onclick="tambahProduk()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                Tambah Produk Berbeda
            </button>

            <button type="submit" id="btnSimpan" class="w-full py-4 bg-gradient-to-r from-teal-500 to-emerald-500 text-white font-bold rounded-xl shadow-md shadow-teal-500/30 hover:shadow-lg hover:shadow-teal-500/40 hover:-translate-y-0.5 transition-all duration-200 active:scale-[0.98]">
                Kirim Data Perolehan
            </button>
        </form>
    </div>

    <div id="successModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal('successModal')"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center transform scale-95 transition-transform duration-300">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-emerald-100 mb-6">
                <svg class="h-8 w-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Penyimpanan Berhasil!</h3>
            <p class="text-slate-500 mb-8 text-sm">Data perolehan Anda telah sukses dicatat ke dalam sistem.</p>
            <button onclick="closeModal('successModal')" class="w-full py-3.5 bg-emerald-500 text-white rounded-xl font-semibold hover:bg-emerald-600 transition-colors shadow-sm">Tutup & Lanjutkan</button>
        </div>
    </div>

    <div id="errorModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeModal('errorModal')"></div>
        <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 text-center transform scale-95 transition-transform duration-300">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-rose-100 mb-6">
                <svg class="h-8 w-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">Terjadi Kesalahan</h3>
            <p id="errorMessage" class="text-slate-500 mb-8 text-sm">Gagal terhubung ke server.</p>
            <button onclick="closeModal('errorModal')" class="w-full py-3.5 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition-colors shadow-sm">Kembali</button>
        </div>
    </div>

    <script>
        // --- MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz78FGxmizakrGRFn4sLEMdovqce11sr32vQKtuE-gHQClCLFp_QO95sg6jnPu0de6e/exec'; 
        
        let mapKaryawan = {}; 
        let semuaProdukList = [];
        let opsiProdukCurrent = '<option value="" disabled selected>-- Pilih Nama Anda Terlebih Dahulu --</option>';

        window.addEventListener('DOMContentLoaded', () => {
            setTanggalHariIni();
            fetchDataDariSpreadsheet();
            
            document.getElementById('nama').addEventListener('change', function() {
                updateDropdownProduk(this.value);
            });
        });

        function setTanggalHariIni() {
            const inputTanggal = document.getElementById('tanggal');
            const d = new Date();
            inputTanggal.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function fetchDataDariSpreadsheet() {
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    mapKaryawan = data.nama || {};
                    semuaProdukList = data.produk || [];
                    
                    const selectNama = document.getElementById('nama');
                    selectNama.innerHTML = '<option value="" disabled selected>-- Pilih Nama Anda --</option>';
                    Object.keys(mapKaryawan).forEach(nama => {
                        selectNama.insertAdjacentHTML('beforeend', `<option value="${nama}">${nama}</option>`);
                    });
                })
                .catch(error => {
                    showModal('errorModal', 'Gagal memuat API. Pastikan internet stabil.');
                });
        }

        function updateDropdownProduk(namaKaryawan) {
            const assignedProducts = mapKaryawan[namaKaryawan].produkAssign || [];
            let htmlOpsi = '<option value="" disabled selected>-- Pilih Produk --</option>';
            
            semuaProdukList.forEach(p => {
                if (assignedProducts.length === 0 || assignedProducts.includes(p.toUpperCase())) {
                    htmlOpsi += `<option value="${p}">${p}</option>`;
                }
            });

            opsiProdukCurrent = htmlOpsi;
            document.querySelectorAll('.product-input').forEach(select => { select.innerHTML = opsiProdukCurrent; });
        }

        function tambahProduk() {
            if(!document.getElementById('nama').value) {
                showModal('errorModal', "Silakan pilih Nama Anda terlebih dahulu!");
                return;
            }
            const container = document.getElementById('dynamic-items-container');
            const template = container.querySelector('.item-card');
            const kartuBaru = template.cloneNode(true);
            
            kartuBaru.querySelector('.product-input').innerHTML = opsiProdukCurrent;
            kartuBaru.querySelector('.product-input').value = '';
            
            const notesWrapper = kartuBaru.querySelector('.notes-wrapper');
            const semuaNotes = notesWrapper.querySelectorAll('.note-item');
            for(let i = 1; i < semuaNotes.length; i++) semuaNotes[i].remove(); 
            
            const notePertama = notesWrapper.querySelector('.note-item');
            notePertama.querySelector('.notes-input').value = '';
            notePertama.querySelector('.btn-remove-note').classList.add('hidden');

            kartuBaru.querySelector('.btn-remove-product').classList.remove('hidden');
            container.appendChild(kartuBaru);
        }

        function tambahNote(btnElement) {
            const notesWrapper = btnElement.previousElementSibling; 
            const noteBaru = notesWrapper.querySelector('.note-item').cloneNode(true);
            noteBaru.querySelector('.notes-input').value = ''; 
            noteBaru.querySelector('.btn-remove-note').classList.remove('hidden'); 
            notesWrapper.appendChild(noteBaru);
        }

        function hapusElemen(btnElement, targetClass) { btnElement.closest(targetClass).remove(); }

        function showModal(modalId, message = '') {
            const modal = document.getElementById(modalId);
            if(message && modalId === 'errorModal') document.getElementById('errorMessage').innerText = message;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.relative').classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.classList.add('opacity-0');
            modal.querySelector('.relative').classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function handleFormSubmit(formObj) {
            const btn = document.getElementById('btnSimpan');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Mengirim...`;
            btn.disabled = true;

            const semuaKartu = document.querySelectorAll('.item-card');
            const arrayItems = [];
            
            semuaKartu.forEach(kartu => {
                const productVal = kartu.querySelector('.product-input').value;
                kartu.querySelectorAll('.notes-input').forEach(noteInput => {
                    let isiNote = noteInput.value.trim();
                    arrayItems.push({ product: productVal, notes: isiNote === "" ? "000000000000" : isiNote });
                });
            });

            const namaTerpilih = formObj.nama.value;
            const formData = {
                tanggal: formObj.tanggal.value,
                nama: namaTerpilih,
                role: mapKaryawan[namaTerpilih].role || "", 
                items: arrayItems
            };

            fetch(scriptURL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(formData)
            })
            .then(res => res.json())
            .then(result => {
                if(result.status === 'sukses') { resetFormState(formObj); showModal('successModal'); }
                else showModal('errorModal', "Error server: " + result.pesan);
            })
            .catch(error => showModal('errorModal', "Gagal menghubungi server."))
            .finally(() => { btn.innerHTML = "Kirim Data Perolehan"; btn.disabled = false; });
        }

        function resetFormState(formObj) {
            formObj.reset();
            setTanggalHariIni();
            document.querySelectorAll('.item-card').forEach((k, i) => { if(i > 0) k.remove(); });
            document.querySelector('.item-card').querySelectorAll('.note-item').forEach((n, i) => { if(i > 0) n.remove(); });
            document.querySelector('.product-input').innerHTML = '<option value="" disabled selected>-- Pilih Nama Anda Terlebih Dahulu --</option>';
        }
    </script>
</body>
</html>
