<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kinerja Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom scrollbar untuk tabel yang panjang (Responsif di HP) */
        .table-scroll::-webkit-scrollbar { height: 8px; }
        .table-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .table-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen p-4 sm:p-6 lg:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight">Kinerja Produk</h1>
                <p class="text-slate-500 text-sm mt-1">Rincian pencapaian target harian, mingguan, dan bulanan.</p>
            </div>
            <div class="flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium border border-blue-100">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="lastUpdate">Memuat data...</span>
            </div>
        </div>

        <div id="product-container" class="space-y-8">
            <div class="text-center py-20 text-slate-400 flex flex-col items-center">
                <svg class="animate-spin h-10 w-10 mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-medium">Menghubungkan ke server...</p>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz78FGxmizakrGRFn4sLEMdovqce11sr32vQKtuE-gHQClCLFp_QO95sg6jnPu0de6e/exec?action=getDashboardData'; 
        
        let rawDataGlobal = [];
        let targetProdukGlobal = {}; 
        let daftarKaryawanGlobal = []; 

        window.addEventListener('DOMContentLoaded', () => {
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    rawDataGlobal = data.input;
                    targetProdukGlobal = data.target; 
                    daftarKaryawanGlobal = data.karyawan || []; 
                    
                    document.getElementById('lastUpdate').innerText = "Update: " + formatTanggalCetak(new Date());
                    prosesData(); 
                })
                .catch(err => {
                    document.getElementById('product-container').innerHTML = `
                        <div class="bg-red-50 text-red-600 p-6 rounded-xl border border-red-200 text-center">
                            <h3 class="font-bold text-lg mb-2">Gagal Memuat Data</h3>
                            <p>Pastikan URL API benar dan koneksi internet stabil.</p>
                        </div>`;
                    console.error(err);
                });
        });

        function prosesData() {
            if (rawDataGlobal.length === 0 && Object.keys(targetProdukGlobal).length === 0) return;

            const hariIni = new Date();
            hariIni.setHours(0,0,0,0);
            const dataPerProduk = {};

            Object.keys(targetProdukGlobal).forEach(namaProduk => {
                let initialIndividu = {};
                daftarKaryawanGlobal.forEach(karyawan => { initialIndividu[karyawan] = 0; });
                dataPerProduk[namaProduk] = { 
                    perolehanHarian: 0, perolehanMingguan: 0, perolehanBulanan: 0, individuBulanan: initialIndividu 
                };
            });

            rawDataGlobal.forEach(row => {
                const prodName = row.product ? row.product.toUpperCase() : "TIDAK DIKETAHUI";
                
                if (!dataPerProduk[prodName]) {
                    let fallbackIndividu = {};
                    daftarKaryawanGlobal.forEach(k => fallbackIndividu[k] = 0);
                    dataPerProduk[prodName] = { perolehanHarian: 0, perolehanMingguan: 0, perolehanBulanan: 0, individuBulanan: fallbackIndividu };
                }

                if (!row.tanggal) return;
                const tglData = new Date(row.tanggal);
                tglData.setHours(0,0,0,0);
                const namaKaryawan = row.nama || "Tanpa Nama";

                if (tglData.getTime() === hariIni.getTime()) dataPerProduk[prodName].perolehanHarian++;

                const selisihHari = Math.ceil(Math.abs(hariIni - tglData) / (1000 * 60 * 60 * 24));
                if (selisihHari <= 7) dataPerProduk[prodName].perolehanMingguan++;

                if (tglData.getMonth() === hariIni.getMonth() && tglData.getFullYear() === hariIni.getFullYear()) {
                    dataPerProduk[prodName].perolehanBulanan++;
                    if (dataPerProduk[prodName].individuBulanan[namaKaryawan] === undefined) {
                        dataPerProduk[prodName].individuBulanan[namaKaryawan] = 0;
                    }
                    dataPerProduk[prodName].individuBulanan[namaKaryawan]++;
                }
            });

            renderDashboard(dataPerProduk);
        }

        function renderDashboard(dataGroup) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const hariIni = new Date();
            const labelHariIni = formatTanggalLabel(hariIni); 
            const labelBulanIni = formatBulanLabel(hariIni);  

            Object.keys(dataGroup).forEach(namaProduk => {
                const data = dataGroup[namaProduk];
                const target = targetProdukGlobal[namaProduk] || { daily: 0, weekly: 0, monthly: 0 };

                const pctDaily = target.daily > 0 ? Math.round((data.perolehanHarian / target.daily) * 100) : 0;
                const pctWeekly = target.weekly > 0 ? Math.round((data.perolehanMingguan / target.weekly) * 100) : 0;
                const pctMonthly = target.monthly > 0 ? Math.round((data.perolehanBulanan / target.monthly) * 100) : 0;

                const gapDaily = data.perolehanHarian - target.daily;
                const gapWeekly = data.perolehanMingguan - target.weekly;
                const gapMonthly = data.perolehanBulanan - target.monthly;

                const arrIndividu = Object.keys(data.individuBulanan).map(nama => {
                    return { nama: nama, total: data.individuBulanan[nama] };
                }).sort((a, b) => b.total - a.total);

                let htmlIndividu = '';
                arrIndividu.forEach(indv => {
                    let isNihil = indv.total === 0;
                    let classRow = isNihil ? "text-slate-400" : "text-slate-700";
                    let labelTotal = isNihil 
                        ? `<span class="bg-red-50 text-red-500 border border-red-100 px-2 py-0.5 rounded-md text-xs font-bold tracking-wide">Nihil</span>` 
                        : `<span class="font-bold text-slate-800">${indv.total}</span>`;
                        
                    htmlIndividu += `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                        <td class="px-4 py-3 ${classRow}">${indv.nama}</td>
                        <td class="px-4 py-3 text-right">${labelTotal}</td>
                    </tr>`;
                });

                const gapFormatter = (gapValue) => {
                    if (gapValue < 0) return `<span class="text-red-600 font-bold">${gapValue}</span>`;
                    return `<span class="text-emerald-600 font-bold">${gapValue}</span>`;
                };

                const htmlCard = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-shadow hover:shadow-md">
                    
                    <div class="table-scroll overflow-x-auto w-full">
                        <table class="w-full text-center border-collapse whitespace-nowrap">
                            <thead>
                                <tr>
                                    <th rowspan="3" class="bg-blue-900 text-white p-4 border border-blue-800 min-w-[180px] w-1/5 shadow-inner">
                                        <div class="text-lg font-bold tracking-wide">${namaProduk}</div>
                                        <div class="text-xs font-medium text-blue-200 mt-1 opacity-80">${labelHariIni}</div>
                                    </th>
                                    <th colspan="4" class="bg-blue-600 text-white p-2 border border-blue-700 text-sm font-semibold tracking-wider uppercase">Daily</th>
                                    <th colspan="4" class="bg-blue-600 text-white p-2 border border-blue-700 text-sm font-semibold tracking-wider uppercase">Weekly</th>
                                    <th colspan="4" class="bg-blue-600 text-white p-2 border border-blue-700 text-sm font-semibold tracking-wider uppercase">Monthly</th>
                                </tr>
                                <tr class="bg-blue-800 text-blue-100 text-xs tracking-widest uppercase">
                                    <th class="p-2 border border-blue-700 font-medium">${labelHariIni}</th>
                                    <th class="p-2 border border-blue-700 font-medium">Target</th>
                                    <th class="p-2 border border-blue-700 font-medium">%</th>
                                    <th class="p-2 border border-blue-700 font-medium">GAP</th>
                                    
                                    <th class="p-2 border border-blue-700 font-medium">${labelBulanIni}</th>
                                    <th class="p-2 border border-blue-700 font-medium">Target</th>
                                    <th class="p-2 border border-blue-700 font-medium">%</th>
                                    <th class="p-2 border border-blue-700 font-medium">GAP</th>

                                    <th class="p-2 border border-blue-700 font-medium">${labelBulanIni}</th>
                                    <th class="p-2 border border-blue-700 font-medium">Target</th>
                                    <th class="p-2 border border-blue-700 font-medium">%</th>
                                    <th class="p-2 border border-blue-700 font-medium">GAP</th>
                                </tr>
                            </thead>
                            <tbody class="text-slate-700 text-sm">
                                <tr>
                                    <td class="bg-red-50 text-red-700 font-bold p-3 border border-slate-200 text-base">${data.perolehanHarian > 0 ? data.perolehanHarian : ''}</td>
                                    <td class="p-3 border border-slate-200 font-medium text-slate-500">${target.daily}</td>
                                    <td class="p-3 border border-slate-200 font-medium">${pctDaily}%</td>
                                    <td class="p-3 border border-slate-200">${gapFormatter(gapDaily)}</td>

                                    <td class="bg-red-50 text-red-700 font-bold p-3 border border-slate-200 text-base">${data.perolehanMingguan > 0 ? data.perolehanMingguan : '-'}</td>
                                    <td class="p-3 border border-slate-200 font-medium text-slate-500">${target.weekly}</td>
                                    <td class="p-3 border border-slate-200 font-medium">${pctWeekly}%</td>
                                    <td class="p-3 border border-slate-200">${gapFormatter(gapWeekly)}</td>

                                    <td class="bg-red-50 text-red-700 font-bold p-3 border border-slate-200 text-base">${data.perolehanBulanan > 0 ? data.perolehanBulanan : '-'}</td>
                                    <td class="p-3 border border-slate-200 font-medium text-slate-500">${target.monthly}</td>
                                    <td class="p-3 border border-slate-200 font-medium">${pctMonthly}%</td>
                                    <td class="p-3 border border-slate-200">${gapFormatter(gapMonthly)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div class="bg-slate-50/50 p-5 sm:p-6 border-t border-slate-200">
                        <div class="flex items-center gap-2 mb-4 text-blue-700">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                            <h4 class="font-bold text-sm uppercase tracking-wider">Perolehan Individu (Bulan Ini)</h4>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full max-w-2xl text-left border border-slate-200 bg-white rounded-xl shadow-sm overflow-hidden">
                                <thead class="bg-slate-100 text-slate-500 text-xs uppercase tracking-wider">
                                    <tr>
                                        <th class="px-4 py-3 border-b border-slate-200 font-semibold">Nama Karyawan</th>
                                        <th class="px-4 py-3 border-b border-slate-200 font-semibold text-right w-32">Total</th>
                                    </tr>
                                </thead>
                                <tbody class="text-sm">
                                    ${htmlIndividu}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', htmlCard);
            });
        }

        // --- FUNGSI FORMAT TANGGAL ---
        const bulanSingkat = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        
        function formatTanggalLabel(date) {
            const d = String(date.getDate()).padStart(2, '0');
            const m = bulanSingkat[date.getMonth()];
            const y = String(date.getFullYear()).slice(-2); 
            return `${d}-${m}-${y}`; 
        }

        function formatBulanLabel(date) {
            const m = bulanSingkat[date.getMonth()];
            const y = String(date.getFullYear()).slice(-2);
            return `${m}-${y}`; 
        }

        function formatTanggalCetak(date) {
            return date.toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
