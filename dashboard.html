<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kinerja Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library untuk mengambil screenshot HTML menjadi Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        
        .table-scroll::-webkit-scrollbar { height: 8px; }
        .table-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        .table-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 8px; }
        .table-scroll::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen p-4 sm:p-6 lg:p-8">

    <div class="max-w-[90rem] mx-auto space-y-8">
        
        <!-- HEADER UTAMA -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight">Kinerja Produk</h1>
                <p class="text-slate-500 text-sm mt-1">Pilih tanggal untuk melihat pencapaian Harian, Mingguan, dan Bulanan.</p>
            </div>
            <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                <div class="flex items-center gap-3 bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-xl w-full sm:w-auto shadow-sm">
                    <label for="filterTanggal" class="text-sm font-bold text-slate-600 whitespace-nowrap">Filter Waktu:</label>
                    <input type="date" id="filterTanggal" onchange="prosesData()" class="bg-transparent text-slate-800 font-bold outline-none cursor-pointer">
                </div>
                <div id="statusUpdate" class="flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2.5 rounded-xl text-sm font-bold border border-blue-100 w-full sm:w-auto justify-center transition-colors">
                    <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span>Memuat...</span>
                </div>
            </div>
        </div>

        <!-- CONTAINER KARTU PRODUK -->
        <div id="product-container" class="space-y-8">
            <!-- Loading State -->
        </div>

        <!-- SECTION: TABEL DETAIL AKUMULASI -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mt-12 relative" id="akumulasi-card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-100 pb-5">
                <div>
                    <h2 class="text-xl font-bold text-slate-800 tracking-tight">Akumulasi Detail Pegawai</h2>
                    <p class="text-slate-500 text-sm mt-1">Rekap perolehan semua pegawai per produk berdasarkan rentang tanggal.</p>
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto" data-html2canvas-ignore="true">
                    <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden shadow-sm p-1">
                        <input type="date" id="startDateDetail" onchange="renderDetailTable()" class="text-sm px-3 py-1.5 outline-none bg-transparent text-slate-700 font-bold cursor-pointer" title="Tanggal Awal">
                        <span class="px-2 text-slate-400 text-sm font-bold">s/d</span>
                        <input type="date" id="endDateDetail" onchange="renderDetailTable()" class="text-sm px-3 py-1.5 outline-none bg-transparent text-slate-700 font-bold cursor-pointer" title="Tanggal Akhir">
                    </div>
                    <button onclick="salinGambarUtuh('akumulasi-card', this)" class="w-full sm:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-300 px-4 py-2.5 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 shadow-sm">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>Copy Gambar Tabel</span>
                    </button>
                </div>
            </div>

            <div class="table-scroll overflow-x-auto w-full rounded-xl border border-slate-200">
                <table id="tabelDetailAkumulasi" class="w-full text-left border-collapse whitespace-nowrap bg-white">
                    <!-- Tabel di-render via JavaScript -->
                </table>
            </div>
        </div>

    </div>

    <button type="button" id="navFab" onclick="openNavModal()" class="fixed bottom-5 right-5 z-[60] flex h-14 w-14 items-center justify-center rounded-full bg-slate-900 text-white shadow-[0_12px_30px_rgba(15,23,42,0.35)] transition hover:-translate-y-1 hover:bg-slate-800" aria-label="Buka menu navigasi">
        <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <div id="navModal" class="hidden fixed inset-0 z-[75] flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeNavModal()"></div>
        <div class="relative w-full max-w-sm overflow-hidden rounded-[28px] border border-white/60 bg-white/90 p-5 shadow-[0_25px_80px_rgba(0,0,0,.3)] backdrop-blur-2xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <p class="text-[11px] font-bold uppercase tracking-[0.24em] text-slate-500">Navigasi</p>
                    <h3 class="font-display text-xl font-bold text-slate-900">Pilih Halaman</h3>
                </div>
                <button type="button" onclick="closeNavModal()" class="text-slate-400 hover:text-rose-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="space-y-3">
                <button type="button" onclick="navigateToPage('index.html')" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3.5 text-left font-semibold text-slate-800 transition hover:bg-slate-100">Form Input</button>
                <button type="button" onclick="navigateToPage('admin.html')" class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3.5 text-left font-semibold text-slate-800 transition hover:bg-slate-100">Admin</button>
            </div>
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script>
        // --- MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI ---
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz78FGxmizakrGRFn4sLEMdovqce11sr32vQKtuE-gHQClCLFp_QO95sg6jnPu0de6e/exec?action=getDashboardData'; 
        
        let rawDataGlobal = [];
        let targetProdukGlobal = {}; 
        let masterKaryawanGlobal = {}; 
        let detailTableSortState = { field: 'total', direction: 'desc', value: '' };

        window.addEventListener('DOMContentLoaded', () => {
            setTanggalFilterHariIni();
            setTanggalFilterDetailDefault();
            
            fetch(scriptURL)
                .then(res => res.json())
                .then(data => {
                    rawDataGlobal = data.input;
                    targetProdukGlobal = data.target; 
                    masterKaryawanGlobal = data.karyawan || {}; 
                    
                    const stat = document.getElementById('statusUpdate');
                    stat.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg><span>Live Update</span>`;
                    stat.classList.replace('bg-blue-50', 'bg-emerald-50');
                    stat.classList.replace('text-blue-700', 'text-emerald-700');
                    stat.classList.replace('border-blue-100', 'border-emerald-200');

                    prosesData(); 
                    renderDetailTable();
                })
                .catch(err => {
                    document.getElementById('statusUpdate').innerHTML = `<span class="text-rose-600">Gagal Memuat</span>`;
                });
        });

        function setTanggalFilterHariIni() {
            const input = document.getElementById('filterTanggal');
            const d = new Date();
            input.value = d.toISOString().split('T')[0];
        }

        function setTanggalFilterDetailDefault() {
            const d = new Date();
            document.getElementById('endDateDetail').value = d.toISOString().split('T')[0];
            const awalBulan = new Date(d.getFullYear(), d.getMonth(), 1);
            const yyyy = awalBulan.getFullYear();
            const mm = String(awalBulan.getMonth() + 1).padStart(2, '0');
            const dd = String(awalBulan.getDate()).padStart(2, '0');
            document.getElementById('startDateDetail').value = `${yyyy}-${mm}-${dd}`;
        }

        function openNavModal() {
            const modal = document.getElementById('navModal');
            if (!modal) return;
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                const box = modal.querySelector('.relative');
                if (box) box.classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeNavModal() {
            const modal = document.getElementById('navModal');
            if (!modal) return;
            const box = modal.querySelector('.relative');
            modal.classList.add('opacity-0');
            if (box) box.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function navigateToPage(page) {
            closeNavModal();
            setTimeout(() => {
                window.location.href = page;
            }, 250);
        }

        // ==========================================
        // FUNGSI COPY/SALIN AJAIB UNTUK MOBILE & DESKTOP
        // ==========================================
        async function salinGambarUtuh(elementId, buttonElement) {
            const element = document.getElementById(elementId);
            if (!element) return;

            const originalHtml = buttonElement.innerHTML;
            const originalClass = buttonElement.className;

            // Efek Loading
            buttonElement.innerHTML = `<svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span>Memproses...</span>`;
            buttonElement.disabled = true;

            try {
                // 1. Kloning elemen aslinya agar kita bisa otak-atik tampilannya tanpa merusak halaman asli
                const clone = element.cloneNode(true);
                
                // 2. Hapus semua tombol copy yang ada di dalam kloningan agar tidak ikut terfoto
                const ignoreElements = clone.querySelectorAll('[data-html2canvas-ignore="true"]');
                ignoreElements.forEach(el => el.remove());

                // 3. Buat pembungkus (wrapper) virtual yang ukurannya dipaksa lebar ala Desktop (1280px)
                const wrapper = document.createElement('div');
                wrapper.style.position = 'absolute';
                wrapper.style.top = '-9999px';  // Sembunyikan di luar layar
                wrapper.style.left = '-9999px';
                wrapper.style.width = '1280px'; // Paksa tampil menjadi versi desktop
                wrapper.style.padding = '10px';
                wrapper.style.backgroundColor = '#f8fafc'; // Warna background Body
                
                // 4. Buka kunci semua scroll tabel yang terpotong di HP
                const scrolls = clone.querySelectorAll('.overflow-x-auto, .table-scroll');
                scrolls.forEach(sc => {
                    sc.classList.remove('overflow-x-auto', 'table-scroll');
                    sc.style.overflow = 'visible';
                });

                // Masukkan kloningan ke pembungkus virtual
                wrapper.appendChild(clone);
                document.body.appendChild(wrapper);

                // 5. Fotokan pembungkus virtual tersebut menggunakan html2canvas
                const canvas = await html2canvas(clone, {
                    backgroundColor: '#ffffff', 
                    scale: 2, // Kualitas HD agar tulisan tidak pecah
                    useCORS: true,
                    windowWidth: 1280 // Mengelabuhi CSS Tailwind agar menggunakan class khusus Desktop (xl:)
                });

                // 6. Buang pembungkus virtual dari halaman
                document.body.removeChild(wrapper);

                // 7. Simpan gambar ke clipboard (papan klip)
                canvas.toBlob(async function(blob) {
                    try {
                        const item = new ClipboardItem({ "image/png": blob });
                        await navigator.clipboard.write([item]);
                        
                        // Efek Berhasil pada tombol
                        buttonElement.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg> <span>Tersalin!</span>`;
                        buttonElement.className = "bg-emerald-50 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-sm w-full sm:w-auto";
                        
                    } catch (err) {
                        alert("Browser Anda tidak mendukung fitur copy gambar ke clipboard secara langsung.");
                    } finally {
                        setTimeout(() => {
                            buttonElement.innerHTML = originalHtml;
                            buttonElement.className = originalClass;
                            buttonElement.disabled = false;
                        }, 2500);
                    }
                });
            } catch (error) {
                alert("Terjadi kesalahan saat memproses gambar tabel.");
                buttonElement.innerHTML = originalHtml;
                buttonElement.disabled = false;
            }
        }

        // ==========================================
        // LOGIKA RENDER TABEL DETAIL AKUMULASI
        // ==========================================
        function renderDetailTable() {
            if (rawDataGlobal.length === 0 || Object.keys(targetProdukGlobal).length === 0) return;

            const startDateVal = document.getElementById('startDateDetail').value;
            const endDateVal = document.getElementById('endDateDetail').value;
            
            if (!startDateVal || !endDateVal) return;
            
            const start = new Date(startDateVal); start.setHours(0,0,0,0);
            const end = new Date(endDateVal); end.setHours(23,59,59,999);
            
            const allProducts = Object.keys(targetProdukGlobal); 
            const allEmployees = Object.keys(masterKaryawanGlobal);
            
            let akumulasi = {};
            allEmployees.forEach(emp => {
                akumulasi[emp] = {};
                allProducts.forEach(prod => { akumulasi[emp][prod] = 0; });
                akumulasi[emp]['TOTAL'] = 0;
            });
            
            rawDataGlobal.forEach(row => {
                if(!row.tanggal) return;
                const tglData = new Date(row.tanggal);
                tglData.setHours(0,0,0,0);
                
                if (tglData.getTime() >= start.getTime() && tglData.getTime() <= end.getTime()) {
                    const prodName = row.product ? row.product.toUpperCase() : "";
                    const empName = row.nama || "";
                    if (allProducts.includes(prodName) && akumulasi[empName]) {
                        akumulasi[empName][prodName]++;
                        akumulasi[empName]['TOTAL']++;
                    }
                }
            });

            const sortedEmployees = [...allEmployees].sort((a, b) => {
                const aValue = getDetailSortValue(a, detailTableSortState.field, detailTableSortState.value, akumulasi, masterKaryawanGlobal);
                const bValue = getDetailSortValue(b, detailTableSortState.field, detailTableSortState.value, akumulasi, masterKaryawanGlobal);

                if (typeof aValue === 'number' && typeof bValue === 'number') {
                    if (aValue === bValue) {
                        return a.localeCompare(b, 'id', { sensitivity: 'base' });
                    }
                    return detailTableSortState.direction === 'asc' ? aValue - bValue : bValue - aValue;
                }

                const nameCompare = String(aValue).localeCompare(String(bValue), 'id', { sensitivity: 'base' });
                return detailTableSortState.direction === 'asc' ? nameCompare : -nameCompare;
            });
            
            let thead = `
                <thead class="bg-slate-100 text-slate-700 text-xs uppercase tracking-wider font-bold">
                    <tr>
                        <th class="p-3 border-b border-r border-slate-200">
                            <button type="button" class="flex w-full items-center justify-between gap-2 text-left" onclick="setDetailTableSort('name')">
                                <span>Nama Pegawai</span>
                                <span class="text-[10px]">${detailTableSortState.field === 'name' ? (detailTableSortState.direction === 'asc' ? '▲' : '▼') : '↕'}</span>
                            </button>
                        </th>`;
            allProducts.forEach(prod => {
                const safeProd = prod.replace(/'/g, "\\'");
                thead += `<th class="p-3 border-b border-r border-slate-200 text-center">
                    <button type="button" class="flex w-full items-center justify-center gap-2 font-bold" onclick="setDetailTableSort('product', '${safeProd}')">
                        <span>${prod}</span>
                        <span class="text-[10px]">${detailTableSortState.field === 'product' && detailTableSortState.value === prod ? (detailTableSortState.direction === 'asc' ? '▲' : '▼') : '↕'}</span>
                    </button>
                </th>`;
            });
            thead += `<th class="p-3 border-b border-slate-200 text-center bg-slate-200 text-slate-800">
                <button type="button" class="flex w-full items-center justify-center gap-2 font-bold" onclick="setDetailTableSort('total')">
                    <span>TOTAL</span>
                    <span class="text-[10px]">${detailTableSortState.field === 'total' ? (detailTableSortState.direction === 'asc' ? '▲' : '▼') : '↕'}</span>
                </button>
            </th></tr></thead>`;
            
            const totalPerProduk = {};
            allProducts.forEach(prod => {
                totalPerProduk[prod] = sortedEmployees.reduce((sum, emp) => sum + akumulasi[emp][prod], 0);
            });
            const grandTotal = sortedEmployees.reduce((sum, emp) => sum + akumulasi[emp]['TOTAL'], 0);

            let tbody = `<tbody class="text-sm text-slate-700 divide-y divide-slate-100">`;
            sortedEmployees.forEach(emp => {
                let totalVal = akumulasi[emp]['TOTAL'];
                let isNihil = totalVal === 0;
                let textClass = isNihil ? "text-slate-400" : "text-slate-800 font-bold";
                
                tbody += `
                    <tr>
                        <td class="p-3 border-r border-slate-100 ${textClass}">${emp}</td>`;
                
                allProducts.forEach(prod => {
                    const assignedProducts = (masterKaryawanGlobal[emp]?.produkAssign || [])
                        .map(item => String(item).trim().toUpperCase());
                    const isAssigned = assignedProducts.length === 0 || assignedProducts.includes(String(prod).trim().toUpperCase());
                    const val = akumulasi[emp][prod];
                    const cellClass = isAssigned
                        ? "p-3 border-r border-slate-100 text-center"
                        : "p-3 border-r border-rose-200 bg-rose-50 text-rose-700 text-center";
                    const valHtml = !isAssigned
                        ? `<span class="font-bold">✕</span>`
                        : (val === 0 ? `<span class="text-slate-300">-</span>` : `<span class="font-bold text-blue-600">${val}</span>`);
                    tbody += `<td class="${cellClass}">${valHtml}</td>`;
                });
                
                let totalHtml = isNihil ? `<span class="text-slate-300">-</span>` : `<span class="font-black text-slate-800">${totalVal}</span>`;
                tbody += `<td class="p-3 text-center bg-slate-50">${totalHtml}</td></tr>`;
            });

            tbody += `
                <tr class="bg-slate-800 text-white font-bold">
                    <td class="p-3 border-r border-slate-700">TOTAL PER PRODUK</td>`;
            allProducts.forEach(prod => {
                const totalValue = totalPerProduk[prod];
                tbody += `<td class="p-3 border-r border-slate-700 text-center">${totalValue}</td>`;
            });
            tbody += `<td class="p-3 text-center bg-slate-900">${grandTotal}</td></tr>`;
            tbody += `</tbody>`;
            
            document.getElementById('tabelDetailAkumulasi').innerHTML = thead + tbody;
        }

        function getDetailSortValue(emp, field, productName, akumulasi, masterKaryawanGlobal) {
            if (field === 'name') {
                return emp.toLowerCase();
            }

            if (field === 'product' && productName) {
                const assignedProducts = (masterKaryawanGlobal[emp]?.produkAssign || [])
                    .map(item => String(item).trim().toUpperCase());
                const isAssigned = assignedProducts.length === 0 || assignedProducts.includes(String(productName).trim().toUpperCase());
                if (!isAssigned) return -1;
                return akumulasi[emp][productName];
            }

            return akumulasi[emp]['TOTAL'];
        }

        function setDetailTableSort(field, value = '') {
            if (detailTableSortState.field === field && detailTableSortState.value === value) {
                detailTableSortState.direction = detailTableSortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                detailTableSortState.field = field;
                detailTableSortState.value = value;
                detailTableSortState.direction = field === 'name' ? 'asc' : 'desc';
            }
            renderDetailTable();
        }

        // ==========================================
        // LOGIKA RENDER DASHBOARD UTAMA
        // ==========================================
        function prosesData() {
            if (rawDataGlobal.length === 0 && Object.keys(targetProdukGlobal).length === 0) return;

            const dateInput = document.getElementById('filterTanggal').value;
            if(!dateInput) return;
            
            const [year, month, day] = dateInput.split('-');
            const baseDate = new Date(year, month - 1, day);
            baseDate.setHours(0,0,0,0);

            const dayOfWeek = baseDate.getDay(); 
            const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek; 
            
            const startOfWeek = new Date(baseDate);
            startOfWeek.setDate(baseDate.getDate() + diffToMonday);
            startOfWeek.setHours(0,0,0,0);

            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23,59,59,999);

            const firstDayOfMonth = new Date(baseDate.getFullYear(), baseDate.getMonth(), 1);
            firstDayOfMonth.setHours(0,0,0,0);
            const lastDayOfMonth = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 0);
            lastDayOfMonth.setHours(23,59,59,999);

            if (startOfWeek < firstDayOfMonth) startOfWeek.setTime(firstDayOfMonth.getTime());
            if (endOfWeek > lastDayOfMonth) endOfWeek.setTime(lastDayOfMonth.getTime());

            const dataPerProduk = {};
            const statusAbsenHarian = {}; 

            Object.keys(targetProdukGlobal).forEach(namaProduk => {
                let initHarian = {};
                let initBulanan = {};
                
                Object.keys(masterKaryawanGlobal).forEach(namaKaryawan => { 
                    const assigned = masterKaryawanGlobal[namaKaryawan].produkAssign || [];
                    if (assigned.length === 0 || assigned.includes(namaProduk.toUpperCase())) {
                        initHarian[namaKaryawan] = 0; 
                        initBulanan[namaKaryawan] = 0; 
                    }
                });
                
                dataPerProduk[namaProduk] = { 
                    perolehanHarian: 0, perolehanMingguan: 0, perolehanBulanan: 0, 
                    individuHarian: initHarian, individuBulanan: initBulanan 
                };
            });

            rawDataGlobal.forEach(row => {
                const prodName = row.product ? row.product.toUpperCase() : "TIDAK DIKETAHUI";
                const namaKaryawan = row.nama || "Tanpa Nama";
                
                if (!row.tanggal) return;
                const tglData = new Date(row.tanggal);
                tglData.setHours(0,0,0,0);

                if (['[CUTI]', '[SAKIT]', '[IZIN]', '[SHIFT_MALAM]'].includes(prodName)) {
                    if (tglData.getTime() === baseDate.getTime()) {
                        statusAbsenHarian[namaKaryawan] = prodName.replace(/\[|\]/g, '').replace('_', ' '); 
                    }
                    return; 
                }

                if (!dataPerProduk[prodName]) return; 

                if (dataPerProduk[prodName].individuHarian[namaKaryawan] === undefined) {
                    dataPerProduk[prodName].individuHarian[namaKaryawan] = 0;
                    dataPerProduk[prodName].individuBulanan[namaKaryawan] = 0;
                }

                if (tglData.getTime() === baseDate.getTime()) {
                    dataPerProduk[prodName].perolehanHarian++;
                    dataPerProduk[prodName].individuHarian[namaKaryawan]++;
                }

                if (tglData.getTime() >= startOfWeek.getTime() && tglData.getTime() <= endOfWeek.getTime()) {
                    dataPerProduk[prodName].perolehanMingguan++;
                }

                if (tglData.getMonth() === baseDate.getMonth() && tglData.getFullYear() === baseDate.getFullYear()) {
                    dataPerProduk[prodName].perolehanBulanan++;
                    dataPerProduk[prodName].individuBulanan[namaKaryawan]++;
                }
            });

            renderDashboard(dataPerProduk, baseDate, startOfWeek, endOfWeek, statusAbsenHarian);
        }

        function renderDashboard(dataGroup, baseDate, startOfWeek, endOfWeek, statusAbsenHarian) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            const labelHariIni = formatTanggalLabel(baseDate); 
            const labelBulanIni = formatBulanLabel(baseDate);  
            const labelMingguIni = formatMingguLabel(startOfWeek, endOfWeek);

            let counterId = 0;

            Object.keys(dataGroup).forEach(namaProduk => {
                counterId++;
                const cardId = `card-produk-${counterId}`;
                
                const data = dataGroup[namaProduk];
                const target = targetProdukGlobal[namaProduk] || { daily: 0, weekly: 0, monthly: 0 };

                const pctDaily = target.daily > 0 ? Math.round((data.perolehanHarian / target.daily) * 100) : 0;
                const pctWeekly = target.weekly > 0 ? Math.round((data.perolehanMingguan / target.weekly) * 100) : 0;
                const pctMonthly = target.monthly > 0 ? Math.round((data.perolehanBulanan / target.monthly) * 100) : 0;

                const gapDaily = data.perolehanHarian - target.daily;
                const gapWeekly = data.perolehanMingguan - target.weekly;
                const gapMonthly = data.perolehanBulanan - target.monthly;

                const arrIndividu = Object.keys(data.individuBulanan).map(nama => {
                    return { nama: nama, harian: data.individuHarian[nama], bulanan: data.individuBulanan[nama] };
                }).sort((a, b) => b.bulanan - a.bulanan);

                let htmlIndividu = '';
                arrIndividu.forEach(indv => {
                    let isAbsen = statusAbsenHarian[indv.nama]; 
                    let isNihil = indv.bulanan === 0;
                    
                    let classRow = isNihil && !isAbsen ? "text-slate-400" : "text-slate-700 font-medium";
                    
                    let labelHarian = '';
                    if (isAbsen) {
                        labelHarian = `<span class="bg-rose-100 text-rose-600 border border-rose-200 px-2 py-0.5 rounded text-[10px] font-bold tracking-wide">${isAbsen}</span>`;
                    } else {
                        labelHarian = indv.harian === 0 ? `<span class="text-slate-300">-</span>` : `<span class="font-bold text-blue-600">${indv.harian}</span>`;
                    }

                    let labelBulanan = isNihil ? `<span class="text-slate-300">-</span>` : `<span class="font-bold text-slate-800">${indv.bulanan}</span>`;
                        
                    htmlIndividu += `
                    <tr class="border-b border-slate-100 last:border-0 text-sm">
                        <td class="px-4 py-2.5 ${classRow}">${indv.nama}</td>
                        <td class="px-4 py-2.5 text-center">${labelHarian}</td>
                        <td class="px-4 py-2.5 text-center bg-slate-50">${labelBulanan}</td>
                    </tr>`;
                });

                if(arrIndividu.length === 0) {
                    htmlIndividu = `<tr><td colspan="3" class="px-4 py-3 text-center text-slate-400 italic">Tidak ada tim yang ditugaskan.</td></tr>`;
                }

                const gapFormatter = (gapValue) => gapValue < 0 ? `<span class="text-red-600 font-bold">${gapValue}</span>` : `<span class="text-emerald-600 font-bold">${gapValue}</span>`;

                const htmlCard = `
                <div id="${cardId}" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col xl:flex-row relative">
                    
                    <!-- TOMBOL COPY GLOBAL KARTU (Sembunyi otomatis saat dipotret html2canvas) -->
                    <div class="absolute top-2 left-2 sm:top-4 sm:left-4 z-20" data-html2canvas-ignore="true">
                        <button onclick="salinGambarUtuh('${cardId}', this)" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold transition-all shadow-md flex items-center gap-1.5">
                            <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg> 
                            <span class="hidden sm:inline">Copy Keseluruhan ${namaProduk}</span>
                            <span class="sm:hidden">Copy</span>
                        </button>
                    </div>

                    <!-- SIDE BANNER -->
                    <div class="xl:w-64 bg-gradient-to-br from-blue-800 to-blue-900 text-white p-8 sm:p-6 flex flex-col justify-center items-center shrink-0 border-b xl:border-b-0 xl:border-r border-blue-900 pt-16 xl:pt-6">
                        <h3 class="text-3xl font-black tracking-wider text-center">${namaProduk}</h3>
                        <span class="text-xs font-medium text-blue-200 mt-2 bg-blue-950 px-3 py-1 rounded-full">${labelHariIni}</span>
                    </div>

                    <div class="flex-1 overflow-hidden flex flex-col bg-white">
                        
                        <!-- TABEL TARGET -->
                        <div class="table-scroll overflow-x-auto w-full border-b border-slate-200 p-2 sm:p-0">
                            <table class="w-full text-center border-collapse whitespace-nowrap bg-white">
                                <thead>
                                    <tr>
                                        <th colspan="4" class="bg-blue-600 text-white p-2.5 border-b border-r border-blue-700 text-xs font-bold tracking-widest uppercase">Daily</th>
                                        <th colspan="4" class="bg-blue-600 text-white p-2.5 border-b border-r border-blue-700 text-xs font-bold tracking-widest uppercase">Weekly</th>
                                        <th colspan="4" class="bg-blue-600 text-white p-2.5 border-b border-blue-700 text-xs font-bold tracking-widest uppercase">Monthly</th>
                                    </tr>
                                    <tr class="bg-blue-50 text-blue-800 text-[10px] tracking-wider uppercase font-bold">
                                        <th class="p-2 border-b border-r border-blue-100">${labelHariIni}</th>
                                        <th class="p-2 border-b border-r border-blue-100">Target</th>
                                        <th class="p-2 border-b border-r border-blue-100">%</th>
                                        <th class="p-2 border-b border-r border-blue-100">GAP</th>
                                        <th class="p-2 border-b border-r border-blue-100">${labelMingguIni}</th>
                                        <th class="p-2 border-b border-r border-blue-100">Target</th>
                                        <th class="p-2 border-b border-r border-blue-100">%</th>
                                        <th class="p-2 border-b border-r border-blue-100">GAP</th>
                                        <th class="p-2 border-b border-r border-blue-100">${labelBulanIni}</th>
                                        <th class="p-2 border-b border-r border-blue-100">Target</th>
                                        <th class="p-2 border-b border-r border-blue-100">%</th>
                                        <th class="p-2 border-b border-blue-100">GAP</th>
                                    </tr>
                                </thead>
                                <tbody class="text-slate-800 text-sm">
                                    <tr class="bg-white">
                                        <td class="bg-blue-50 text-blue-700 font-black p-3 border-r border-slate-200 text-base">${data.perolehanHarian > 0 ? data.perolehanHarian : ''}</td>
                                        <td class="p-3 border-r border-slate-200 font-semibold text-slate-500">${target.daily}</td>
                                        <td class="p-3 border-r border-slate-200 font-bold">${pctDaily}%</td>
                                        <td class="p-3 border-r border-slate-200">${gapFormatter(gapDaily)}</td>
                                        <td class="bg-blue-50 text-blue-700 font-black p-3 border-r border-slate-200 text-base">${data.perolehanMingguan > 0 ? data.perolehanMingguan : '-'}</td>
                                        <td class="p-3 border-r border-slate-200 font-semibold text-slate-500">${target.weekly}</td>
                                        <td class="p-3 border-r border-slate-200 font-bold">${pctWeekly}%</td>
                                        <td class="p-3 border-r border-slate-200">${gapFormatter(gapWeekly)}</td>
                                        <td class="bg-blue-50 text-blue-700 font-black p-3 border-r border-slate-200 text-base">${data.perolehanBulanan > 0 ? data.perolehanBulanan : '-'}</td>
                                        <td class="p-3 border-r border-slate-200 font-semibold text-slate-500">${target.monthly}</td>
                                        <td class="p-3 border-r border-slate-200 font-bold">${pctMonthly}%</td>
                                        <td class="p-3">${gapFormatter(gapMonthly)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <!-- TABEL TIM -->
                        <div class="p-4 sm:p-5 bg-slate-50 flex-1">
                            <h4 class="font-bold text-xs text-slate-600 uppercase tracking-wide mb-3">Tim Penanggung Jawab</h4>
                            
                            <div class="overflow-x-auto border border-slate-200 rounded-lg">
                                <table class="w-full max-w-2xl text-left bg-white">
                                    <thead class="bg-slate-100 text-slate-600 text-[10px] font-bold uppercase tracking-wider">
                                        <tr>
                                            <th class="px-4 py-2 border-b border-slate-200">Nama</th>
                                            <th class="px-4 py-2 border-b border-slate-200 text-center border-l border-slate-200">Total Harian</th>
                                            <th class="px-4 py-2 border-b border-slate-200 text-center border-l border-slate-200">Total Bulanan</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${htmlIndividu}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', htmlCard);
            });
        }

        const bulanSingkat = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Ags", "Sep", "Okt", "Nov", "Des"];
        function formatTanggalLabel(date) { return `${String(date.getDate()).padStart(2, '0')}-${bulanSingkat[date.getMonth()]}-${String(date.getFullYear()).slice(-2)}`; }
        function formatBulanLabel(date) { return `${bulanSingkat[date.getMonth()]}-${String(date.getFullYear()).slice(-2)}`; }
        function formatMingguLabel(start, end) { return `${String(start.getDate()).padStart(2, '0')}-${String(end.getDate()).padStart(2, '0')} ${bulanSingkat[start.getMonth()]}`; }
    </script>
</body>
</html>
